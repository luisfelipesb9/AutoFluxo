# AutoFluxo — proxy reverso + TLS + redirect HTTP->HTTPS.
#
# Arquivo PORTÁVEL: serve tanto montado no container nginx (docker-compose.prod.yml)
# quanto copiado para /etc/nginx/conf.d/ de um nginx nativo instalado no host.
#
# Certificados em /etc/nginx/certs/{fullchain,privkey}.pem — caminho único que serve
# os dois cenários:
#   - auto-assinado:  scripts/gen-self-signed-cert.sh grava aí.
#   - Let's Encrypt:  scripts/init-letsencrypt.sh copia o cert da pasta live/ para aí.

upstream autofluxo_backend {
    # Container: nome do serviço "app" na rede do compose.
    # Nginx nativo no host: troque para 127.0.0.1:4000.
    server app:4000;
}

# ── HTTP :80 — desafio ACME (Let's Encrypt) + redirect para HTTPS ─────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;  # catch-all — substitua pelo hostname real (ex.: app.automix.local).

    # Desafio HTTP-01 do Let's Encrypt via webroot. No caminho auto-assinado fica ocioso.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo o resto é redirecionado para HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — TLS, frontend estático e proxy da API ────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;                # nginx >= 1.25.1. Em versões antigas use: listen 443 ssl http2;
    server_name _;           # idem acima — substitua pelo hostname real.

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Política TLS moderna (ajuste se a Automix exigir versões/ciphers específicos).
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS na borda (o backend também envia quando HTTPS=true — defense-in-depth).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frontend estático (vanilla JS, sem build).
    root /usr/share/nginx/html;
    index login.html;

    location / {
        try_files $uri $uri/ /login.html;
    }

    # API -> backend Express.
    location /api/ {
        proxy_pass http://autofluxo_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # Coerente com o body limit de 10mb do Express.
    client_max_body_size 10m;
}
