<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciautomix — Cadastros</title>

    <link rel="stylesheet" href="../assets/design-system.css">
    <link rel="stylesheet" href="../assets/layout.css">
    <link rel="stylesheet" href="../components/components.css">
    <link rel="stylesheet" href="./cadastros.css">
</head>
<body>

<!-- Overlay Mobile -->
<div class="overlay" id="overlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">GERENCIAUTOMIX</div>
    <nav class="sidebar-menu" id="sidebarMenu"></nav>
    <!-- sidebar-footer renderizado por layout.js -->
</aside>

<!-- Área Principal -->
<div class="main-container">

    <!-- Header -->
    <header class="header">

        <div class="header-left">
            <button class="hamburger" id="hamburger">☰</button>
            <h1 class="page-title">Gestão de Cadastros</h1>
        </div>

        <div class="header-actions">

            <button class="notification-btn" title="Notificações">
                <span class="notification-dot"></span>
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6V11a6 6 0 1 0-12 0v5l-2 2v1h16v-1z"/>
                </svg>
            </button>

            <div class="user-dropdown">
                <button class="user-menu" id="userMenu">User ▼</button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="#">Meu Perfil</a>
                    <a href="#">Configurações</a>
                    <a href="#" id="logoutBtn">Sair</a>
                </div>
            </div>

        </div>

    </header>

    <!-- Conteúdo -->
    <main class="content">
        <div class="content-wrapper">

            <div class="cadastros-page">

                <!-- Cabeçalho da tela -->
                <div class="cadastros-header">
                    <h2 class="cadastros-title">Administração de Cadastros</h2>
                    <div class="tabs">
                        <button class="tab-button active" data-tab="usuarios">Usuários</button>
                        <button class="tab-button" data-tab="pecas">Peças</button>
                        <button class="tab-button" data-tab="clientes">Clientes</button>
                    </div>
                </div>

                <!-- Barra de ações -->
                <div class="action-bar">
                    <div class="search-container">
                        <div class="input-group">
                            <input type="text" id="searchInput" placeholder=" ">
                            <label for="searchInput">Buscar...</label>
                        </div>
                    </div>
                    <button class="btn btn--accent btn--md" onclick="openCreateModal()">+ Novo</button>
                </div>

                <!-- Tabela -->
                <div class="table-card">
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr id="tableHead">
                                    <th>Dados</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                    <div class="pagination" id="pagination"></div>
                </div>

            </div>

        </div>
    </main>

</div>


<!-- ============================================================ -->
<!-- MODAL — CADASTRO                                             -->
<!-- ============================================================ -->

<div class="modal-overlay" id="cadastroModal">
    <div class="modal">

        <div class="modal-header">
            <h3 id="modalTitle">Novo Cadastro</h3>
        </div>

        <div class="modal-body">
            <form class="modal-form" onsubmit="return false;">
                <!-- Campos renderizados dinamicamente por cadastros.js -->
            </form>
        </div>

        <div class="modal-footer">
            <button class="btn btn--ghost btn--md" onclick="closeModal('cadastroModal')">Cancelar</button>
            <button class="btn btn--accent btn--md" onclick="saveCadastro()">Salvar</button>
        </div>

    </div>
</div>


<!-- ============================================================ -->
<!-- MODAL — CONFIRMAÇÃO DE DESATIVAÇÃO                          -->
<!-- ============================================================ -->

<div class="modal-overlay" id="confirmModal">
    <div class="modal">

        <div class="modal-header">
            <h3>Confirmar desativação</h3>
        </div>

        <div class="modal-body">
            Tem certeza que deseja desativar este registro? Esta ação pode ser revertida posteriormente.
        </div>

        <div class="modal-footer">
            <button class="btn btn--ghost btn--md" onclick="closeModal('confirmModal')">Cancelar</button>
            <button class="btn btn--danger btn--md" onclick="confirmDeactivate()">Confirmar</button>
        </div>

    </div>
</div>


<!-- Scripts -->
<script src="../js/layout.js"></script>
<script src="../components/components.js"></script>
<script src="./cadastros.js"></script>

</body>
</html>
